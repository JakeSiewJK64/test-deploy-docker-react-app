name: Docker Image CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PAT }}
      - name: build and push
        run: |
          CLEAN_BRANCH=$(echo ${GITHUB_REF_NAME} | sed 's/\//-/g')
          IMAGE_TAG=${CLEAN_BRANCH}-$(date +%s)
          docker build . -t ${{ secrets.REGISTRY_USER }}/test-react-docker-deploy:$IMAGE_TAG
          docker push ${{ secrets.REGISTRY_USER }}/test-react-docker-deploy:$IMAGE_TAG
