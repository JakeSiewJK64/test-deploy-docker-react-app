name: Docker Image CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PAT }}
      - name: build and push
        run: |
          # Use HEAD_REF if it exists (PR), otherwise use REF_NAME (Push)
          RAW_BRANCH=${{ github.head_ref || github.ref_name }}
          # Clean the name: replace slashes and convert to lowercase
          CLEAN_BRANCH=$(echo $RAW_BRANCH | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=${CLEAN_BRANCH}-$(date +%s)
          REPO=test-react-docker-deploy
          docker build . -t ${{ secrets.REGISTRY_USER }}/$REPO:$IMAGE_TAG
          docker push ${{ secrets.REGISTRY_USER }}/$REPO:$IMAGE_TAG
